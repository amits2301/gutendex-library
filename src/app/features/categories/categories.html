<div class="page">
  <div class="hero">
    <h1>Gutenberg Project</h1>
    <p>
      A social cataloging website that allows you to freely search its database of books,
      annotations, and reviews.
    </p>
  </div>
  <div class="categories">
    @for (category of categories; track category.topic) {
      <div class="category-card" (click)="navigate(category.topic)">
        <img [src]="category.icon" class="icon" />
        <span class="label">{{ category.label }}</span>
        <span class="arrow">→</span>
      </div>
    }
  </div>
</div>
