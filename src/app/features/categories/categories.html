<div class="page">
  <div class="hero">
    <h1>{{ labels.APP.TITLE }}</h1>
    <p>
      {{ labels.APP.SUBTITLE }}
    </p>
  </div>

  <div class="categories">
    @for (category of categories; track category.key) {
      <div class="category-card" (click)="navigate(category.topic)">
        <img [src]="category.icon" class="icon" />
        <span class="label">
          {{ labels.GENRES[category.key] }}
        </span>
        <span class="arrow">→</span>
      </div>
    }
  </div>
</div>
